server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/competition_portal_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=REPLACE_WITH_A_LONG_RANDOM_SECRET
app.jwt.expiration-ms=86400000
app.jwt.cookie-name=sivarfest_token